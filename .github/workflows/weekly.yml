name: Weekly Tender Scrape

on:
  schedule:
    # Every Monday at 06:00 UTC (~9:30am India, ~9am Gulf time)
    - cron: '0 6 * * 1'
  workflow_dispatch: {}   # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: scrapers
        run: pip install -r requirements.txt

      - name: Move existing tenders.json into scrapers/ (if present)
        run: |
          if [ -f dashboard/tenders.json ]; then
            cp dashboard/tenders.json scrapers/tenders.json
          fi

      - name: Run scraper
        working-directory: scrapers
        run: python scrape.py
        continue-on-error: true   # one source failing shouldn't kill the run

      - name: Run extraction (Groq)
        working-directory: scrapers
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python extract.py
        continue-on-error: true

      - name: Run merge / verification
        working-directory: scrapers
        run: python merge.py

      - name: Copy updated data into dashboard folder
        run: |
          cp scrapers/tenders.json dashboard/tenders.json
          cp scrapers/meta.json dashboard/meta.json

      - name: Commit and push if changed
        run: |
          git config user.name "tender-tracker-bot"
          git config user.email "actions@github.com"
          git add dashboard/tenders.json dashboard/meta.json
          
          # Only run commit/pull/push if there are actually changes staged
          if ! git diff --quiet --cached; then
            git commit -m "Weekly tender data update - $(date -u +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit."
          fi
